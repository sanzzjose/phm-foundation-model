# SSL federado FedAvgM 50x50 con beta=0.7 y seed=44 (Fase 4f multi-seed).
#
# Replica exacta de ssl_federated_fedavgm_50x50_m0_7.yaml salvo:
#   - seed: 42 -> 44.
#   - run_name (sufijo _seed44).
#   - paths.checkpoint_dir (subdirectorio dedicado).
#
# Receta intacta (ver _seed43 para detalle).

run_name: ssl_federated_fedavgm_50x50_m0_7_seed44_patchtst_phm
seed: 44
stage: full

model:
  name: patchtst_phm_base
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  patch_size: 16
  n_patches: 32

ssl:
  mask_ratio: 0.3
  loss: mse

data:
  role: PRETRAIN_SOURCE
  split: train
  batch_size: 32
  batch_size_policy: adaptive_by_channels
  max_channel_batch: 512
  min_batch_size: 1
  client_source: results/audit/audit_groups.json
  client_sampling_strategy: weighted
  aggregation_weight_policy: final_client_weight

federated:
  algorithm: fedavgm
  fedprox_mu: null
  n_rounds: 50
  local_steps: 50
  clients_per_round: all
  ckpt_every_rounds: 10

training:
  lr: 0.0003
  weight_decay: 0.05
  grad_clip_norm: 1.0
  amp: auto

server_momentum:
  beta: 0.7
  nesterov: false
  initialize: zeros

paths:
  processed_root:  /content/drive/MyDrive/fm_fl_phmd/processed
  log_dir:         /content/drive/MyDrive/fm_fl_phmd/logs/pretraining_federated
  checkpoint_dir:  /content/drive/MyDrive/fm_fl_phmd/checkpoints/ssl_federated_fedavgm_50x50_m0_7_seed44
