# SSL federado FedAvg 50x50 con seed=43 (Fase 4f multi-seed).
#
# Replica exacta de ssl_federated_fedavg_50x50.yaml salvo:
#   - seed: 42 -> 43.
#   - run_name (sufijo _seed43).
#   - paths.checkpoint_dir (subdirectorio dedicado para no pisar el ckpt
#     del seed=42 ya ejecutado en Fase 4b).
#
# Receta intacta: 50 rondas x 50 steps x 10 clientes = 25.000 local steps,
# algorithm=fedavg, fedprox_mu=null, mismos 36 PS, mismos 10 clientes,
# batch adaptive_by_channels cap 512, sampler weighted con caps audit v2.3,
# mask_ratio=0.3, W=512/P=16, lr=0.0003, weight_decay=0.05.

run_name: ssl_federated_fedavg_50x50_seed43_patchtst_phm
seed: 43
stage: full

model:
  name: patchtst_phm_base
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  patch_size: 16
  n_patches: 32

ssl:
  mask_ratio: 0.3
  loss: mse

data:
  role: PRETRAIN_SOURCE
  split: train
  batch_size: 32
  batch_size_policy: adaptive_by_channels
  max_channel_batch: 512
  min_batch_size: 1
  client_source: results/audit/audit_groups.json
  client_sampling_strategy: weighted
  aggregation_weight_policy: final_client_weight

federated:
  algorithm: fedavg
  fedprox_mu: null
  n_rounds: 50
  local_steps: 50
  clients_per_round: all
  ckpt_every_rounds: 10

training:
  lr: 0.0003
  weight_decay: 0.05
  grad_clip_norm: 1.0
  amp: auto

paths:
  processed_root:  /content/drive/MyDrive/fm_fl_phmd/processed
  log_dir:         /content/drive/MyDrive/fm_fl_phmd/logs/pretraining_federated
  checkpoint_dir:  /content/drive/MyDrive/fm_fl_phmd/checkpoints/ssl_federated_fedavg_50x50_seed43
