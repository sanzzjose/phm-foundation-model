# Downstream RUL CMAPSS_RUL - modo FULL_FINETUNING con lr_backbone=1e-5.
#
# Backbone PatchTSTPhm cargado desde el SSL central full
# (ckpt_step100000.pt) y ENTRENABLE junto con la cabeza
# RegressionHead lineal. lr_backbone=1e-5 es el sweet spot validado
# en CWRU + HSG18: lr=1e-4 produjo catastrophic forgetting del
# encoder; lr=1e-5 lo afina sin destruir el SSL.
#
# Hiperparametros:
#   lr_head     = 1e-3
#   lr_backbone = 1e-5      (sweet spot para no destruir el SSL)
#
# Uso:
#   python -m training.train_downstream_rul \
#     --config training/configs/downstream_cmapss_rul_full_finetuning_lr1e-5.yaml \
#     --mode full_finetuning \
#     --checkpoint /content/drive/.../ssl_central_full/ckpt_step100000.pt

run_name: downstream_cmapss_rul_full_finetuning_lr1e-5
seed: 42
dataset: CMAPSS_RUL
task: regression_rul

model:
  name: patchtst_phm_base
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  patch_size: 16
  n_patches: 32

head:
  hidden_dim: null
  dropout: 0.0
  activation: null
  keep_last_dim: false

data:
  processed_downstream_root: /content/drive/MyDrive/fm_fl_phmd/processed_downstream
  target_key: rul_capped_125
  n_channels_fallback: 24
  batch_size: 32
  batch_size_policy: adaptive_by_channels
  max_channel_batch: 512
  min_batch_size: 1
  num_workers: 2

training:
  max_epochs: 20
  lr_head: 0.001
  lr_backbone: 0.00001      # 1e-5 (sweet spot validado en CWRU + HSG18)
  weight_decay: 0.01
  amp: auto
  grad_clip_norm: 1.0
  log_every: 50
  eval_every_epochs: 1
  metric_for_best: rmse_val
  lower_is_better: true

  max_train_batches_per_epoch: null
  max_val_batches: null
  max_test_batches: null

evaluation:
  save_predictions: false

paths:
  log_dir: /content/drive/MyDrive/fm_fl_phmd/logs/downstream/cmapss_rul
  checkpoint_dir: /content/drive/MyDrive/fm_fl_phmd/checkpoints/downstream/cmapss_rul
