# SSL federado FedAvgM 50x50 con server momentum beta=0.9 (Fase 4d).
#
# Identico a `ssl_federated_fedavg_50x50.yaml` (LR constante, sin scheduler)
# salvo:
#   - algorithm: fedavg -> fedavgm
#   - bloque server_momentum activado con beta=0.9, Nesterov off, init zeros.
#   - run_name y paths.checkpoint_dir unicos.
#
# Receta del momentum (Hsu et al. 2019, convencion clasica con lr_server=1):
#   v_t = beta * v_{t-1} + delta_t
#   w_{t+1} = w_t + v_t
# Cuando beta=0, v_t = delta_t y w_{t+1} = w_t + delta_t = FedAvg estandar.
#
# Objetivo: aislar el efecto del **momentum del servidor** en la
# comparacion FedAvg vs central_25k. Fase 4c mostro que el scheduler
# explica solo 20-30% del gap; el resto parece algoritmico (drift de
# clientes, ausencia de momentum federado). FedAvgM es el primer paso
# para tratar la heterogeneidad inter-cliente sin tocar la receta local
# ni introducir control variates (eso seria SCAFFOLD).
#
# Comparacion principal de Fase 4d (todos 25.000 local steps):
#   central_25k vs fedavg_50x50_constant vs fedavgm_50x50_m0_9.
#
# NO LANZAR sin autorizacion explicita en Colab GPU.

run_name: ssl_federated_fedavgm_50x50_m0_9_patchtst_phm
seed: 42
stage: full

model:
  name: patchtst_phm_base
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  patch_size: 16
  n_patches: 32

ssl:
  mask_ratio: 0.3
  loss: mse

data:
  role: PRETRAIN_SOURCE
  split: train
  batch_size: 32
  batch_size_policy: adaptive_by_channels
  max_channel_batch: 512
  min_batch_size: 1
  client_source: results/audit/audit_groups.json
  client_sampling_strategy: weighted
  aggregation_weight_policy: final_client_weight

federated:
  algorithm: fedavgm
  fedprox_mu: null
  n_rounds: 50
  local_steps: 50
  clients_per_round: all
  ckpt_every_rounds: 10

training:
  lr: 0.0003
  weight_decay: 0.05
  grad_clip_norm: 1.0
  amp: auto

# Server momentum (Fase 4d). Si se elimina este bloque y se mantiene
# algorithm=fedavgm, los defaults (beta=0.9, nesterov=false, zeros) se
# aplican. Si algorithm=fedavg, este bloque se ignora.
server_momentum:
  beta: 0.9
  nesterov: false
  initialize: zeros

paths:
  processed_root:  /content/drive/MyDrive/fm_fl_phmd/processed
  log_dir:         /content/drive/MyDrive/fm_fl_phmd/logs/pretraining_federated
  checkpoint_dir:  /content/drive/MyDrive/fm_fl_phmd/checkpoints/ssl_federated_fedavgm_50x50_m0_9
