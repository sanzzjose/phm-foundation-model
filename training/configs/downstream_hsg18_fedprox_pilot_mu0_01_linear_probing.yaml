# Downstream HSG18 - linear_probing desde el ckpt FL FedProx pilot mu=0.01.
#
# HSG18 (hdd, dominio fisicamente distinto de bearings) es el segundo
# TT primary donde el SSL central confirmo transferencia (+34 pp
# macro_f1 sobre baseline). En el FedAvg pilot v0.1 el linear probing
# rindio 0.6080 (recall clase 0 = 36.5 %, balance recuperable) y el
# full_finetuning_lr1e-5 colapso a la clase mayoritaria (0.5547,
# recall clase 0 = 24.2 %). La ablacion lr1e-4 confirmo hipotesis B
# estructural: subir el LR no rescata el embedding FL HDD.
#
# Replicamos aqui el linear probing con el ckpt FedProx para evaluar
# si el termino proximal mu=0.01 ayuda al cliente hdd mono-dataset
# (HSF15).
#
# Backbone congelado, solo entrena la cabeza Linear(d_model, n_classes).
#
# Replica EXACTAMENTE el config homologo FedAvg
# (downstream_hsg18_fedavg_pilot_linear_probing.yaml) salvo run_name,
# paths de salida y el ckpt referenciado en los comentarios.
#
# Uso:
#   python -m training.train_downstream_classification \
#     --config training/configs/downstream_hsg18_fedprox_pilot_mu0_01_linear_probing.yaml \
#     --mode linear_probing \
#     --checkpoint /content/drive/MyDrive/fm_fl_phmd/checkpoints/ssl_federated_pilot_fedprox_mu0_01/ssl_federated_pilot_fedprox_mu0_01_patchtst_phm/ckpt_final.pt

run_name: downstream_hsg18_fedprox_pilot_mu0_01_linear_probing
seed: 42
dataset: HSG18
task: classification_multiclass

model:
  name: patchtst_phm_base
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  patch_size: 16
  n_patches: 32

data:
  processed_root: /content/drive/MyDrive/fm_fl_phmd/processed
  dataset: HSG18
  batch_size: 64
  batch_size_policy: adaptive_by_channels
  max_channel_batch: 512
  min_batch_size: 1
  num_workers: 2

training:
  max_epochs: 20
  lr_head: 0.001
  lr_backbone: 0.0001         # canonico en config; backbone congelado en linear_probing
  weight_decay: 0.01
  amp: auto
  grad_clip_norm: 1.0
  log_every: 50
  eval_every_epochs: 1
  metric_for_best: macro_f1_val
  head_dropout: 0.1

  max_train_batches_per_epoch: null
  max_val_batches: null
  max_test_batches: null

paths:
  log_dir: /content/drive/MyDrive/fm_fl_phmd/logs/downstream_federated_pilot_fedprox_mu0_01/hsg18
  checkpoint_dir: /content/drive/MyDrive/fm_fl_phmd/checkpoints/downstream_federated_pilot_fedprox_mu0_01/hsg18
