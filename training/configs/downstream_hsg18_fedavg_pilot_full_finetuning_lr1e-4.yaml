# Downstream HSG18 - full_finetuning con lr_backbone=1e-4 desde el ckpt FL pilot.
#
# ABLACION DIAGNOSTICA (commit posterior a 77ea059).
#
# En la fase 4 de cierre downstream federado, HSG18 full_finetuning
# con lr_backbone=1e-5 (sweet spot validado en CWRU + HSG18 CENTRAL)
# colapso a la clase mayoritaria sobre el ckpt FL pilot:
#
#     macro_f1_test     = 0.5547
#     recall clase 0    = 24.2 %   (553 / 2288)
#     recall clase 1    = 99.3 %   (2273 / 2288)
#
# El linear_probing FL (backbone congelado) si balancea
# (macro_f1=0.6080, recall clase 0=36.5 %), lo que sugiere que el
# embedding FL no es suficientemente discriminativo y que con
# lr_backbone=1e-5 el backbone apenas se mueve, dejando que la cabeza
# absorba el desbalance natural del train (clase 1=18304 vs
# clase 0=9152, ratio 2:1).
#
# Esta ablacion sube lr_backbone a 1e-4 (10x mas alto que el sweet
# spot central) para distinguir dos hipotesis:
#
#     A) Problema de adaptacion downstream por LR demasiado
#        conservador sobre el ckpt FL (menos informativo que central);
#        el backbone necesita mas holgura para escapar del colapso.
#     B) Problema estructural del embedding FL en dominio HDD; el
#        cliente FL `hdd` tiene un solo dataset (HSF15) y el embedding
#        no captura suficiente diversidad para HSG18, asi que ningun
#        LR razonable lo arreglara.
#
# Lectura esperable:
#   - Si macro_f1_lr1e-4 > macro_f1_lr1e-5 y recall clase 0 mejora sin
#     destruir recall clase 1 -> A (parcialmente de adaptacion).
#   - Si macro_f1_lr1e-4 <= fed_linear o sigue cerca de from_scratch o
#     colapsa de otra manera -> B (estructural).
#
# Cualquier hallazgo aqui es diagnostico, NO autoriza full FL.
#
# NOTA importante sobre el sufijo lr1e-4:
# - En CWRU central, lr_backbone=1e-4 produjo CATASTROPHIC FORGETTING
#   sobre el ckpt central (macro_f1 0.169, val colapso a bal_acc=0.25
#   en 5 epocas). Por eso el sweet spot central canonico es 1e-5.
# - Aqui usamos lr_backbone=1e-4 a PROPOSITO sobre el ckpt FL para
#   testear si el embedding FL es "tan informativo" que romper con
#   lr alto es la causa, o si es tan poco informativo que un lr
#   conservador no lo aprovecha.
#
# Uso:
#   python -m training.train_downstream_classification \
#     --config training/configs/downstream_hsg18_fedavg_pilot_full_finetuning_lr1e-4.yaml \
#     --mode full_finetuning \
#     --checkpoint /content/drive/MyDrive/fm_fl_phmd/checkpoints/ssl_federated_pilot/ssl_federated_pilot_patchtst_phm/ckpt_final.pt

run_name: downstream_hsg18_fedavg_pilot_full_finetuning_lr1e-4
seed: 42
dataset: HSG18
task: classification_multiclass

model:
  name: patchtst_phm_base
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  patch_size: 16
  n_patches: 32

data:
  processed_root: /content/drive/MyDrive/fm_fl_phmd/processed
  dataset: HSG18
  batch_size: 64
  batch_size_policy: adaptive_by_channels
  max_channel_batch: 512
  min_batch_size: 1
  num_workers: 2

training:
  max_epochs: 20
  lr_head: 0.001
  lr_backbone: 0.0001         # 1e-4: 10x mas alto que el sweet spot central; ablacion diagnostica
  weight_decay: 0.01
  amp: auto
  grad_clip_norm: 1.0
  log_every: 50
  eval_every_epochs: 1
  metric_for_best: macro_f1_val
  head_dropout: 0.1

  max_train_batches_per_epoch: null
  max_val_batches: null
  max_test_batches: null

paths:
  log_dir: /content/drive/MyDrive/fm_fl_phmd/logs/downstream_federated_pilot/hsg18
  checkpoint_dir: /content/drive/MyDrive/fm_fl_phmd/checkpoints/downstream_federated_pilot/hsg18
