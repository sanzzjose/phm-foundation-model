# Downstream CWRU - full_finetuning con lr_backbone=1e-5 desde el ckpt
# FL FedProx pilot mu=0.01.
#
# Backbone preentrenado FEDERADAMENTE (FedProx pilot mu=0.01,
# ckpt_final.pt) + cabeza Linear, ambos entrenables. lr_backbone=1e-5
# es el sweet spot validado en CWRU+HSG18 con el SSL central
# (lr=1e-4 produjo catastrophic forgetting; 1e-5 afina sin destruir
# el backbone).
#
# Replica EXACTAMENTE el config homologo FedAvg
# (downstream_cwru_fedavg_pilot_full_finetuning_lr1e-5.yaml) salvo
# run_name, paths de salida y el ckpt referenciado en los comentarios.
#
# Uso:
#   python -m training.train_downstream_classification \
#     --config training/configs/downstream_cwru_fedprox_pilot_mu0_01_full_finetuning_lr1e-5.yaml \
#     --mode full_finetuning \
#     --checkpoint /content/drive/MyDrive/fm_fl_phmd/checkpoints/ssl_federated_pilot_fedprox_mu0_01/ssl_federated_pilot_fedprox_mu0_01_patchtst_phm/ckpt_final.pt

run_name: downstream_cwru_fedprox_pilot_mu0_01_full_finetuning_lr1e-5
seed: 42
dataset: CWRU
task: classification_multiclass

model:
  name: patchtst_phm_base
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  patch_size: 16
  n_patches: 32

data:
  processed_root: /content/drive/MyDrive/fm_fl_phmd/processed
  dataset: CWRU
  batch_size: 64
  batch_size_policy: adaptive_by_channels
  max_channel_batch: 512
  min_batch_size: 1
  num_workers: 2

training:
  max_epochs: 20
  lr_head: 0.001
  lr_backbone: 0.00001        # 1e-5 sweet spot validado en CWRU + HSG18
  weight_decay: 0.01
  amp: auto
  grad_clip_norm: 1.0
  log_every: 50
  eval_every_epochs: 1
  metric_for_best: macro_f1_val
  head_dropout: 0.1

  max_train_batches_per_epoch: null
  max_val_batches: null
  max_test_batches: null

paths:
  log_dir: /content/drive/MyDrive/fm_fl_phmd/logs/downstream_federated_pilot_fedprox_mu0_01/cwru
  checkpoint_dir: /content/drive/MyDrive/fm_fl_phmd/checkpoints/downstream_federated_pilot_fedprox_mu0_01/cwru
