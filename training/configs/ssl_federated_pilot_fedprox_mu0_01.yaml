# SSL federado pilot FedProx mu=0.01 (v0.2): 10 rondas x 50 steps locales
# x 10 clientes = 5 000 steps totales. Cap stage=pilot: 20 000 local steps.
#
# Comparable BIT-A-BIT con el pilot FedAvg (commit 8735c4e):
# - mismos 36 PRETRAIN_SOURCE
# - mismos 10 clientes
# - misma politica `final_client_weight` con caps audit v2.3 (0.10/0.25/0.005)
# - mismo batch adaptive cap 512
# - mismos lr/weight_decay/amp
# - mismo presupuesto local
# Unica diferencia: FedProx con mu=0.01 anyade el termino proximal
#     0.5 * mu * sum_l ||theta_l - theta_global_l||^2
# a la loss SSL de cada cliente, anclando los updates locales al
# state_dict global de inicio de ronda.
#
# Motivacion: el pilot FedAvg pasa convergencia pero la evaluacion
# downstream HSG18 colapsa (clientes mono-dataset, ver
# results/downstream/fl_pilot_vs_central/README.md). FedProx con mu
# pequeno reduce drift en clientes con pocos datasets, lo cual
# DEBERIA mejorar la representacion HDD sin penalizar la representacion
# bearings. Es la opcion (A) del bloque federado pendiente.
#
# NO LANZAR sin autorizacion explicita en Colab A100. La presencia de
# este YAML solo documenta los hyperparams; el trainer respeta el
# gating duro stage=pilot.

run_name: ssl_federated_pilot_fedprox_mu0_01_patchtst_phm
seed: 42
stage: pilot

model:
  name: patchtst_phm_base
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  patch_size: 16
  n_patches: 32

ssl:
  mask_ratio: 0.3
  loss: mse

data:
  role: PRETRAIN_SOURCE
  split: train
  batch_size: 32
  batch_size_policy: adaptive_by_channels
  max_channel_batch: 512
  min_batch_size: 1
  client_source: results/audit/audit_groups.json
  client_sampling_strategy: weighted
  aggregation_weight_policy: final_client_weight

federated:
  algorithm: fedprox
  fedprox_mu: 0.01
  n_rounds: 10
  local_steps: 50
  clients_per_round: all
  ckpt_every_rounds: 5

training:
  lr: 0.0003
  weight_decay: 0.05
  grad_clip_norm: 1.0
  amp: auto

paths:
  processed_root:  /content/drive/MyDrive/fm_fl_phmd/processed
  log_dir:         /content/drive/MyDrive/fm_fl_phmd/logs/pretraining_federated
  checkpoint_dir:  /content/drive/MyDrive/fm_fl_phmd/checkpoints/ssl_federated_pilot_fedprox_mu0_01
