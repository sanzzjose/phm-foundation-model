# Downstream HSG18 - full_finetuning con lr_backbone=1e-5 desde el ckpt
# FL FedProx pilot mu=0.01.
#
# Backbone preentrenado FEDERADAMENTE con FedProx mu=0.01 + cabeza
# Linear, ambos entrenables. Misma config que la version CWRU
# equivalente, distinto run_name y dataset.
#
# En el FedAvg pilot v0.1, esta corrida colapso a la clase mayoritaria
# (macro_f1 0.5547, recall clase 0 = 24.2 %, recall clase 1 = 99.3 %).
# La ablacion lr1e-4 sobre el ckpt FedAvg confirmo hipotesis B
# estructural. La pregunta abierta es: anyadir el termino proximal
# durante el SSL federado (FedProx) produce un encoder mas
# discriminativo para HDD? Si lo hace, este full_finetuning deberia
# subir significativamente. Si no, hipotesis B se reconfirma.
#
# Replica EXACTAMENTE el config homologo FedAvg
# (downstream_hsg18_fedavg_pilot_full_finetuning_lr1e-5.yaml) salvo
# run_name, paths de salida y el ckpt referenciado en los comentarios.
#
# Uso:
#   python -m training.train_downstream_classification \
#     --config training/configs/downstream_hsg18_fedprox_pilot_mu0_01_full_finetuning_lr1e-5.yaml \
#     --mode full_finetuning \
#     --checkpoint /content/drive/MyDrive/fm_fl_phmd/checkpoints/ssl_federated_pilot_fedprox_mu0_01/ssl_federated_pilot_fedprox_mu0_01_patchtst_phm/ckpt_final.pt

run_name: downstream_hsg18_fedprox_pilot_mu0_01_full_finetuning_lr1e-5
seed: 42
dataset: HSG18
task: classification_multiclass

model:
  name: patchtst_phm_base
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  patch_size: 16
  n_patches: 32

data:
  processed_root: /content/drive/MyDrive/fm_fl_phmd/processed
  dataset: HSG18
  batch_size: 64
  batch_size_policy: adaptive_by_channels
  max_channel_batch: 512
  min_batch_size: 1
  num_workers: 2

training:
  max_epochs: 20
  lr_head: 0.001
  lr_backbone: 0.00001        # 1e-5 sweet spot validado en CWRU + HSG18
  weight_decay: 0.01
  amp: auto
  grad_clip_norm: 1.0
  log_every: 50
  eval_every_epochs: 1
  metric_for_best: macro_f1_val
  head_dropout: 0.1

  max_train_batches_per_epoch: null
  max_val_batches: null
  max_test_batches: null

paths:
  log_dir: /content/drive/MyDrive/fm_fl_phmd/logs/downstream_federated_pilot_fedprox_mu0_01/hsg18
  checkpoint_dir: /content/drive/MyDrive/fm_fl_phmd/checkpoints/downstream_federated_pilot_fedprox_mu0_01/hsg18
