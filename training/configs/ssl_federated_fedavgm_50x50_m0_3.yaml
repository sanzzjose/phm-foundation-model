# SSL federado FedAvgM 50x50 con server momentum beta=0.3 (Fase 4e-lite).
#
# Beta moderado-bajo del barrido (lite). Hipotesis: con beta=0.9 vimos que
# CWRU lin salia del colapso pero HSG18 ft se rompia (-25 pp). Beta=0.3 es
# el extremo conservador del barrido: el momentum aporta una pequena dosis
# de empuje extra sin acumular tanta velocity como 0.9.
#
# Identico a ssl_federated_fedavgm_50x50_m0_9.yaml salvo:
#   - run_name
#   - paths.checkpoint_dir
#   - server_momentum.beta: 0.9 -> 0.3
#
# Resto idéntico (LR constante, sin scheduler, mismos 36 PS, mismos 10
# clientes, misma topologia FL, mismo sampler, batch adaptativo).

run_name: ssl_federated_fedavgm_50x50_m0_3_patchtst_phm
seed: 42
stage: full

model:
  name: patchtst_phm_base
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  patch_size: 16
  n_patches: 32

ssl:
  mask_ratio: 0.3
  loss: mse

data:
  role: PRETRAIN_SOURCE
  split: train
  batch_size: 32
  batch_size_policy: adaptive_by_channels
  max_channel_batch: 512
  min_batch_size: 1
  client_source: results/audit/audit_groups.json
  client_sampling_strategy: weighted
  aggregation_weight_policy: final_client_weight

federated:
  algorithm: fedavgm
  fedprox_mu: null
  n_rounds: 50
  local_steps: 50
  clients_per_round: all
  ckpt_every_rounds: 10

training:
  lr: 0.0003
  weight_decay: 0.05
  grad_clip_norm: 1.0
  amp: auto

server_momentum:
  beta: 0.3
  nesterov: false
  initialize: zeros

paths:
  processed_root:  /content/drive/MyDrive/fm_fl_phmd/processed
  log_dir:         /content/drive/MyDrive/fm_fl_phmd/logs/pretraining_federated
  checkpoint_dir:  /content/drive/MyDrive/fm_fl_phmd/checkpoints/ssl_federated_fedavgm_50x50_m0_3
