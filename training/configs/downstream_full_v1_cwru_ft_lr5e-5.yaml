# Ablación cabo 2 (Fase 6a): CWRU full_finetuning del FL canónico con
# lr_backbone = 5e-5 (más agresivo que el canónico 1e-5).
#
# Junto con la corrida a 1e-6 y el canónico a 1e-5, mapea la sensibilidad al
# LR del colapso de fedavgm_50x50_m0_7_canonical full_ft en CWRU. Si ningún
# LR lo acerca al linear (0.425) ni al fedavg (0.715), el problema es
# estructural del checkpoint con momentum (no del LR de adaptación).
#
# Ejecutar con --output-dir <.../full_v1_ablations/cwru_ft_lr5e-5>.

suite_id: downstream_full_v1_cwru_ft_lr5e-5
seed: 42
output_dir: results/downstream/full_v1_ablations/cwru_ft_lr5e-5

checkpoints:
  - id: fedavgm_50x50_m0_7_canonical
    origin: fedavgm
    path: /content/drive/MyDrive/fm_fl_phmd/checkpoints/ssl_federated_fedavgm_50x50_m0_7/ssl_federated_fedavgm_50x50_m0_7_patchtst_phm/ckpt_final.pt

datasets:
  - CWRU

modes_per_task:
  CWRU: [full_finetuning]

classification:
  max_epochs: 20
  early_stopping_patience: 8
  metric: macro_f1_val
  lr_head: 1.0e-3
  lr_backbone: 1.0e-5
  lr_backbone_full_finetuning: 5.0e-5     # override de la ablación

processed_root: /content/drive/MyDrive/fm_fl_phmd/processed
processed_downstream_root: /content/drive/MyDrive/fm_fl_phmd/processed_downstream
